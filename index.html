<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>简易购物站</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>简易购物站</h1>
      <button id="cartButton" class="cart-button">购物车（<span id="cartCount">0</span>）</button>
    </header>

    <main class="container">
      <section>
        <h2>商品列表</h2>
        <div id="productList" class="product-grid"></div>
      </section>

      <aside id="cartPanel" class="cart-panel hidden" aria-live="polite">
        <h2>购物车</h2>
        <ul id="cartItems"></ul>
        <p class="total">合计：¥<span id="cartTotal">0</span></p>
        <button id="checkoutButton" class="checkout">结算</button>
      </aside>
    </main>

    <template id="productTemplate">
      <article class="product-card">
        <h3 class="name"></h3>
        <p class="desc"></p>
        <p class="price"></p>
        <button class="add-btn">加入购物车</button>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
